<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Radio PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .btn-radio {
            display: block;
            width: 80%;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            background-color: #1db954;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn-stop {
            background-color: #e11d48;
        }
    </style>
	</head>
<body>

    <h1>Télécommande Radio Bose</h1>
    <p>Connectez votre appareil en Bluetooth à l'enceinte Bose</p>

    <button class="btn-radio" onclick="jouerRadio('https://radioclassique.ice.infomaniak.ch/radioclassique-high.mp3')">Radio Classique</button>
    <button class="btn-radio" onclick="jouerRadio('http://audio.brossardmedia.com:8000/rtl.mp3')">RTL</button>
    
    <button class="btn-radio btn-stop" onclick="arreterRadio()">Arrêter</button>
	<p style="font-size: 12px; color: #666; margin-top: 30px;">Version : 1.0.1</p>

    <script>
        // Création de l'élément audio unique en arrière-plan
        let lecteurAudio = new Audio();

<!--         function jouerRadio(urlFlux) {
            lecteurAudio.src = urlFlux;
            lecteurAudio.play()
            .then(() => console.log("Lecture en cours..."))
            .catch(err => console.error("Erreur de lecture :", err));
        } -->

function jouerRadio(urlFlux) {
    try {
        lecteurAudio.src = urlFlux;
        lecteurAudio.play()
        .then(() => {
            // On supprime l'alert() qui figeait l'application
            console.log("Lecture lancée avec succès sur le flux : " + urlFlux);
        })
        .catch(err => {
            // On ne garde une alerte qu'en cas de vrai problème de réseau
            alert("Erreur de lecture : " + err.message);
        });
    } catch (e) {
        console.error("Erreur script : " + e.message);
    }
}

        function arreterRadio() {
            lecteurAudio.pause();
            lecteurAudio.src = "";
        }

        // Enregistrement du Service Worker pour la PWA
        if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker enregistré !', reg))
        .catch(err => console.error('Erreur SW :', err));
    });
}
    </script>
</body>
</html>
