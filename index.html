<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Radio PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .btn-radio {
            display: block;
            width: 80%;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            background-color: #1db954;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-radio:active {
            background-color: #1aa34a;
        }
        .btn-stop {
            background-color: #e11d48;
        }
        .btn-stop:active {
            background-color: #be123c;
        }
        #statut {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }
        .version {
            font-size: 12px;
            color: #666;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>Télécommande Radio Bose</h1>
    <p>Connectez votre appareil en Bluetooth à l'enceinte Bose</p>

    <button class="btn-radio" onclick="jouerRadio('https://radioclassique.ice.infomaniak.ch/radioclassique-high.mp3')">Radio Classique</button>
    <button class="btn-radio" onclick="jouerRadio('http://audio.brossardmedia.com:8000/rtl.mp3')">RTL</button>
    
    <button class="btn-radio btn-stop" onclick="arreterRadio()">Arrêter</button>

    <div id="statut">Prêt</div>
    <p class="version">Version : 1.0</p>

    <script>
        // Le lecteur est initialisé à null pour être créé proprement à chaque écoute
        let lecteurAudio = null;

        function jouerRadio(urlFlux) {
            const statutDiv = document.getElementById("statut");
            statutDiv.innerText = "Connexion au flux...";
            statutDiv.style.color = "#ffb703"; // Orange pendant le chargement

            try {
                // Si un flux joue déjà, on l'interrompt et on nettoie l'objet précédent
                if (lecteurAudio) {
                    lecteurAudio.pause();
                    lecteurAudio.src = "";
                    lecteurAudio = null;
                }

                // Création d'un nouvel objet à chaque appui pour contourner le blocage de Chrome
                lecteurAudio = new Audio(urlFlux);
                lecteurAudio.preload = "none";

                lecteurAudio.play()
                .then(() => {
                    statutDiv.innerText = "Lecture en cours...";
                    statutDiv.style.color = "#1db954"; // Vert quand le son démarre
                    console.log("Flux lancé avec succès : " + urlFlux);
                })
                .catch(err => {
                    statutDiv.innerText = "Erreur de lecture (" + err.message + ")";
                    statutDiv.style.color = "#e11d48"; // Rouge en cas d'erreur
                    console.error("Détails erreur Chrome :", err);
                });

            } catch (e) {
                statutDiv.innerText = "Erreur Script : " + e.message;
                statutDiv.style.color = "#e11d48";
            }
        }

        function arreterRadio() {
            const statutDiv = document.getElementById("statut");
            if (lecteurAudio) {
                lecteurAudio.pause();
                lecteurAudio.src = "";
                lecteurAudio = null;
            }
            statutDiv.innerText = "Arrêté";
            statutDiv.style.color = "#ffffff";
        }

        // Enregistrement optimisé au chargement complet de la page
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log("Service Worker Bose enregistré !", reg))
                .catch(err => console.error("Échec d'enregistrement du SW :", err));
            });
        }
    </script>
</body>
</html>
